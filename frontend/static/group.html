<!doctype html>
<html>
    <head>
        <title>Grinder</title>
        <link rel="icon" type="image/png" href="/images/grinder.png" />
        <link rel="stylesheet" href="/style.css" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
    </head>
    <body>
        <h2 class="sr-only">Grinder — Group</h2>

        <div class="app">
            <div class="topbar">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <a href="/"><div class="logo">Grind<span>e</span>r</div></a>
                <div class="topbar-right">
                    <div class="notif-dot"></div>
                    <div class="avatar-sm" id="topbar-initials">-</div>
                </div>
            </div>

            <div class="sidebar" id="sidebar">
                <div class="sidebar-label">Me</div>
                <a class="sitem" href="/">
                    <span class="sicon">◈</span>Dashboard
                </a>
                <a class="sitem" href="/tasks">
                    <span class="sicon">√</span>My Tasks<span
                        class="sbadge"
                        id="task-badge"
                        >3</span
                    >
                </a>
                <a class="sitem" href="/assignments">
                    <span class="sicon">📄</span>Assignments<span
                        class="sbadge"
                        id="assign-badge"
                        style="
                            background: rgba(245, 158, 11, 0.25);
                            color: var(--amber);
                        "
                        >2</span
                    >
                </a>
                <div class="sidebar-label">Groups</div>
                <div id="sidebar-groups"></div>
                <a class="sitem sitem-new">
                    <span class="sicon">+</span>New Group
                </a>
            </div>

            <!-- GROUP (generic) -->
            <div class="page active" id="page-group">
                <div class="page-header">
                    <div>
                        <div class="page-title" id="group-name">—</div>
                        <div class="page-sub" id="group-sub">—</div>
                    </div>
                </div>
                <div class="content">
                    <div class="group-stat-row">
                        <div class="gstat">
                            <div class="gstat-val" id="stat-avghp">—</div>
                            <div class="gstat-label">avg HP</div>
                        </div>
                        <div class="gstat">
                            <div class="gstat-val" id="stat-online">—</div>
                            <div class="gstat-label">online</div>
                        </div>
                        <div class="gstat">
                            <div class="gstat-val" id="stat-tasks">—</div>
                            <div class="gstat-label">active tasks</div>
                        </div>
                    </div>
                    <div>
                        <div class="sec-label">Members</div>
                        <div class="card-list" id="members-list"></div>
                    </div>
                    <div>
                        <div class="sec-label">Group tasks</div>
                        <div class="card-list" id="group-tasks"></div>
                        <div style="margin-top: 8px" id="add-wrap">
                            <button class="add-btn" onclick="showAdminForm()">
                                <span class="plus">+</span>Add task for this
                                group
                            </button>
                        </div>
                        <div
                            class="form-panel"
                            id="admin-form"
                            style="display: none; margin-top: 8px"
                        >
                            <div class="form-title" id="form-title">
                                New group task
                            </div>
                            <div class="form-row">
                                <div class="form-label">Task title</div>
                                <input
                                    class="form-input"
                                    id="af-title"
                                    placeholder="e.g. Read chapter 9"
                                />
                            </div>
                            <div class="form-row-split">
                                <div class="form-row">
                                    <div class="form-label">Type</div>
                                    <select class="form-input" id="af-type">
                                        <option>StudyHall</option>
                                        <option>Social</option>
                                        <option>Reading</option>
                                        <option>Assignment</option>
                                        <option>Other</option>
                                    </select>
                                </div>
                                <div class="form-row">
                                    <div class="form-label">Due date</div>
                                    <input
                                        class="form-input"
                                        id="af-due"
                                        type="date"
                                    />
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-label">HP reward</div>
                                <input
                                    class="form-input"
                                    id="af-hp"
                                    type="number"
                                    placeholder="e.g. 50"
                                    min="0"
                                    max="200"
                                />
                            </div>
                            <div class="form-actions">
                                <button
                                    class="btn ghost"
                                    onclick="hideAdminForm()"
                                >
                                    Cancel</button
                                ><button
                                    class="btn primary"
                                    onclick="saveAdminTask()"
                                >
                                    Assign to group
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div
            class="sidebar-overlay"
            id="sidebar-overlay"
            onclick="toggleSidebar()"
        ></div>
        <div class="toast" id="toast"></div>

        <script src="utils.js"></script>

        <script>
            const GROUP_ID = parseInt(
                new URLSearchParams(window.location.search).get("id"),
            );

            if (GROUP_ID === null) window.location.href = "/";

            function showAdminForm() {
                const f = document.getElementById("admin-form");
                f.style.display = "flex";
                f.style.flexDirection = "column";
                document.getElementById("add-wrap").style.display = "none";
            }

            function hideAdminForm() {
                document.getElementById("admin-form").style.display = "none";
                document.getElementById("add-wrap").style.display = "block";
            }

            async function saveAdminTask() {
                const title = document.getElementById("af-title").value.trim();
                const type = document.getElementById("af-type").value;
                const dueVal = document.getElementById("af-due").value;
                const reward =
                    parseInt(document.getElementById("af-hp").value) || 40;
                if (!title) {
                    showToast("Please enter a task title");
                    return;
                }
                const typeColors = {
                    StudyHall: "blue",
                    Social: "purple",
                    Reading: "amber",
                    Assignment: "green",
                    Other: "muted",
                };
                const due = dueVal
                    ? Math.floor(new Date(dueVal).getTime() / 1000)
                    : null;
                const group = GROUP_ID;
                await fetch("/api/task", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        title,
                        type,
                        due,
                        reward,
                        group,
                    }),
                    credentials: "include",
                }).then((r) => {
                    if (r.ok) {
                        window.location.reload();
                    }
                });
                hideAdminForm();
                showToast("Task assigned to group");
            }

            function renderMember(m, user_id) {
                const hpColorVar = {
                    green: "var(--green)",
                    amber: "var(--amber)",
                    red: "var(--red)",
                }[m.hpColor];
                const pct = Math.round((m.health / 1000) * 100);
                const youSpan =
                    m.id == user_id
                        ? '<span class="you-label">(you)</span>'
                        : "";
                const roleStyle = false //m.roleColor
                    ? ' style="color: var(--' + m.roleColor + ')"'
                    : "";
                return (
                    '<div class="member-card">' +
                    // '<div class="m-av" style="background: ' +
                    //m.color +
                    //'">' +
                    to_initials(m.full_name) +
                    // "</div>" +
                    '<div class="m-info">' +
                    '<div class="m-name">' +
                    m.name +
                    " " +
                    youSpan +
                    "</div>" +
                    '<div class="m-sub"' +
                    roleStyle +
                    ">" +
                    // m.role +
                    "</div></div>" +
                    '<div class="m-hp">' +
                    '<div class="m-hp-val" style="color: ' +
                    hpColorVar +
                    '">' +
                    m.health +
                    '</div><div class="m-bar">' +
                    '<div class="m-bar-fill" style="width: ' +
                    pct +
                    "%; background: " +
                    hpColorVar +
                    '"></div></div></div>' +
                    // '<div class="spip ' +
                    //m.status +
                    //'"></div>
                    "</div>"
                );
            }

            function renderTask(task, isAdmin) {
                const removeBtn = isAdmin
                    ? '<button class="btn ghost" style="font-size: 11px; padding: 5px 10px; flex-shrink: 0;" ' +
                      "onclick=\"this.closest('.admin-task-card').remove(); showToast('Task removed')\">" +
                      "Remove</button>"
                    : "";
                return (
                    '<div class="admin-task-card">' +
                    '<div class="admin-task-info">' +
                    '<div class="admin-task-title">' +
                    task.title +
                    '</div><div class="admin-task-meta">' +
                    '<span class="pill ' +
                    task.typeColor +
                    '">' +
                    task.type +
                    '</span><span class="date-label">' +
                    formaterDue(task.due) +
                    '</span><span class="pill green">+' +
                    task.reward +
                    " HP</span></div></div>" +
                    removeBtn +
                    "</div>"
                );
            }

            async function setup() {
                const USER_ID = await (await fetch(`/api/user/whoami`)).json();

                let user_data = await (
                    await fetch(`/api/user/${USER_ID}`)
                ).json();
                document.querySelector("#topbar-initials").textContent =
                    to_initials(user_data.full_name);

                // utestående tasks
                // document.getElementById("task-badge").textContent =
                //     data.taskBadge;
                // document.getElementById("assign-badge").textContent =
                //     data.assignBadge;

                let groups = await (
                    await fetch(`/api/user/${USER_ID}/groups`)
                ).json();
                let g = await (await fetch(`/api/group/${GROUP_ID}`)).json();

                document.getElementById("sidebar-groups").innerHTML =
                    sidebarGroups(groups, GROUP_ID);

                document.getElementById("group-name").textContent = g.name;
                document.getElementById("group-sub").innerHTML =
                    g.admin_id == USER_ID
                        ? // g.subtitle +
                          ' · <span style="color: var(--accent2)">you are admin</span>'
                        : "";
                document.getElementById("stat-avghp").textContent =
                    g.users.reduce(
                        (accumulator, user) => accumulator + user.health,
                        0,
                    ) / g.users.length;
                // document.getElementById("stat-online").textContent =
                //     100;
                document.getElementById("stat-tasks").textContent =
                    g.tasks.length;

                document.getElementById("members-list").innerHTML = g.users
                    .map((user) => renderMember(user, USER_ID))
                    .join("");
                document.getElementById("group-tasks").innerHTML = g.tasks
                    .map((t) => renderTask(t, g.admin_id == USER_ID))
                    .join("");

                document.getElementById("form-title").textContent =
                    "New group task — " + g.name;

                if (!g.admin_id == USER_ID) {
                    document.getElementById("add-wrap").style.display = "none";
                }
            }

            setup();
        </script>
    </body>
</html>

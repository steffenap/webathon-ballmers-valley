<html>
    <head>
        <link rel="stylesheet" href="/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    </head>
    <body>
        <h2 class="sr-only">StudyHP — My Tasks</h2>

        <div class="app">
            <div class="topbar">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <div class="logo">study<span>hp</span></div>
                <div class="topbar-right">
                    <div class="notif-dot"></div>
                    <div class="avatar-sm" id="topbar-initials">AL</div>
                </div>
            </div>

            <div class="sidebar" id="sidebar">
                <div class="sidebar-label">Me</div>
                <a class="sitem" href="/">
                    <span class="sicon">◈</span>Dashboard
                </a>
                <a class="sitem active" href="/tasks">
                    <span class="sicon">✓</span>My Tasks<span
                        class="sbadge"
                        id="task-badge"
                        >3</span
                    >
                </a>
                <a class="sitem" href="/assignments">
                    <span class="sicon">📄</span>Assignments<span
                        class="sbadge"
                        id="assign-badge"
                        style="
                            background: rgba(245, 158, 11, 0.25);
                            color: var(--amber);
                        "
                        >2</span
                    >
                </a>
                <div class="sidebar-label">Groups</div>
                <div id="sidebar-groups"></div>
                <a class="sitem sitem-new">
                    <span class="sicon">+</span>New Group
                </a>
            </div>

            <!-- TASKS -->
            <div class="page active" id="page-tasks">
                <div class="page-header">
                    <div>
                        <div class="page-title">My Tasks</div>
                        <div class="page-sub">
                            From system defaults, group admins, and your own
                            assignments
                        </div>
                    </div>
                </div>
                <div class="content">
                    <div class="legend-row">
                        <div class="source-tag system">⬡ System</div>
                        <span style="font-size: 11px; color: var(--muted)"
                            >auto-generated</span
                        >
                        <div class="source-tag admin legend-sep">◈ Admin</div>
                        <span style="font-size: 11px; color: var(--muted)"
                            >from group admins</span
                        >
                        <div class="source-tag personal legend-sep">
                            ✦ Personal
                        </div>
                        <span style="font-size: 11px; color: var(--muted)"
                            >added by you</span
                        >
                    </div>
                    <div>
                        <div class="sec-label">Due soon</div>
                        <div class="card-list" id="due-soon-list"></div>
                    </div>
                    <div>
                        <div class="sec-label">Upcoming</div>
                        <div class="card-list" id="upcoming-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <div
            class="sidebar-overlay"
            id="sidebar-overlay"
            onclick="toggleSidebar()"
        ></div>
        <div class="toast" id="toast"></div>

        <script>
            let taskBadge = 0;

            function toggleSidebar() {
                document.getElementById("sidebar").classList.toggle("open");
                document
                    .getElementById("sidebar-overlay")
                    .classList.toggle("open");
            }

            function showToast(msg) {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.transform = "translateX(-50%) translateY(0)";
                clearTimeout(t._t);
                t._t = setTimeout(() => {
                    t.style.transform = "translateX(-50%) translateY(60px)";
                }, 2200);
            }

            function checkTask(card, amount) {
                if (card.classList.contains("done")) return;
                card.querySelector(".chk").classList.add("on");
                card.querySelector(".task-title").style.textDecoration =
                    "line-through";
                card.classList.add("done");
                taskBadge = Math.max(0, taskBadge - 1);
                const b = document.getElementById("task-badge");
                b.textContent = taskBadge;
                if (taskBadge === 0) b.style.display = "none";
                showToast("+" + amount + " HP — Task completed");
            }

            const sourceTags = {
                system:
                    '<div class="source-tag system">⬡ System</div>',
                admin:
                    '<div class="source-tag admin">◈ Admin</div>',
                personal:
                    '<div class="source-tag personal">✦ Personal</div>',
            };

            function renderTask(task) {
                const doneClass = task.done ? " done" : "";
                const strikeStyle = task.done
                    ? ' style="text-decoration: line-through"'
                    : "";
                const chkClass = task.done ? " on" : "";
                const hpClass = task.done
                    ? ' style="color: var(--muted)"'
                    : "";
                const dateClass =
                    "date-label" + (task.done ? " faint" : "");
                const pills = task.tags
                    .map(
                        (t) =>
                            '<span class="pill ' +
                            t.color +
                            '">' +
                            t.label +
                            "</span>",
                    )
                    .join("");
                return (
                    '<div class="task-card' +
                    doneClass +
                    '" onclick="checkTask(this, ' +
                    task.hp +
                    ')">' +
                    '<div class="chk' +
                    chkClass +
                    '"></div>' +
                    '<div class="task-body">' +
                    '<div class="task-title"' +
                    strikeStyle +
                    ">" +
                    task.title +
                    "</div>" +
                    '<div class="task-meta">' +
                    (sourceTags[task.source] || "") +
                    pills +
                    '<span class="' +
                    dateClass +
                    '">' +
                    task.date +
                    "</span>" +
                    "</div></div>" +
                    '<div class="task-hp"' +
                    hpClass +
                    ">+" +
                    task.hp +
                    " HP</div>" +
                    "</div>"
                );
            }

            function sidebarGroups(groups) {
                return groups
                    .map(
                        (g) =>
                            '<a class="sitem" href="/group?id=' +
                            g.id +
                            '"><div class="gpip" style="background: ' +
                            g.color +
                            '"></div>' +
                            g.name +
                            (g.isAdmin
                                ? '<span class="sitem-admin">admin</span>'
                                : "") +
                            "</a>",
                    )
                    .join("");
            }

            fetch("/data.json")
                .then((r) => r.json())
                .then((data) => {
                    document.getElementById(
                        "topbar-initials",
                    ).textContent = data.user.initials;

                    taskBadge = data.taskBadge;
                    document.getElementById("task-badge").textContent =
                        taskBadge;
                    document.getElementById("assign-badge").textContent =
                        data.assignBadge;

                    document.getElementById("sidebar-groups").innerHTML =
                        sidebarGroups(data.groups);

                    document.getElementById("due-soon-list").innerHTML =
                        data.tasks.dueSoon.map(renderTask).join("");
                    document.getElementById("upcoming-list").innerHTML =
                        data.tasks.upcoming.map(renderTask).join("");
                });
        </script>
    </body>
</html>

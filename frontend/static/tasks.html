<!DOCTYPE html>
<html>
    <head>
        <title>Grinder</title>
        <link rel="icon" type="image/png" href="/images/grinder.png">
        <link rel="stylesheet" href="/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    </head>
    <body>
        <h2 class="sr-only">Grinder — My Tasks</h2>

        <div class="app">
            <div class="topbar">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <a href="/"><div class="logo">Grind<span>e</span>r</div></a>
                <div class="topbar-right">
                    <div class="notif-dot"></div>
                    <div class="avatar-sm" id="topbar-initials">-</div>
                </div>
            </div>

            <div class="sidebar" id="sidebar">
                <div class="sidebar-label">Me</div>
                <a class="sitem" href="/">
                    <span class="sicon">◈</span>Dashboard
                </a>
                <a class="sitem active" href="/tasks">
                    <span class="sicon">✓</span>My Tasks<span
                        class="sbadge"
                        id="task-badge"
                        >3</span
                    >
                </a>
                <a class="sitem" href="/assignments">
                    <span class="sicon">📄</span>Assignments<span
                        class="sbadge"
                        id="assign-badge"
                        style="
                            background: rgba(245, 158, 11, 0.25);
                            color: var(--amber);
                        "
                        >2</span
                    >
                </a>
                <div class="sidebar-label">Groups</div>
                <div id="sidebar-groups"></div>
                <a class="sitem sitem-new">
                    <span class="sicon">+</span>New Group
                </a>
            </div>

            <!-- TASKS -->
            <div class="page active" id="page-tasks">
                <div class="page-header">
                    <div>
                        <div class="page-title">My Tasks</div>
                        <div class="page-sub">
                            From system defaults, group admins, and your own
                            assignments
                        </div>
                    </div>
                </div>
                <div class="content">
                    <div class="legend-row">
                        <div class="source-tag system">⬡ System</div>
                        <span style="font-size: 11px; color: var(--muted)"
                            >auto-generated</span
                        >
                        <div class="source-tag admin legend-sep">◈ Admin</div>
                        <span style="font-size: 11px; color: var(--muted)"
                            >from group admins</span
                        >
                        <div class="source-tag personal legend-sep">
                            ✦ Personal
                        </div>
                        <span style="font-size: 11px; color: var(--muted)"
                            >added by you</span
                        >
                    </div>
                    <div>
                        <div class="sec-label">Due soon</div>
                        <div class="card-list" id="due-soon-list"></div>
                    </div>
                    <div>
                        <div class="sec-label">Upcoming</div>
                        <div class="card-list" id="upcoming-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <div
            class="sidebar-overlay"
            id="sidebar-overlay"
            onclick="toggleSidebar()"
        ></div>
        <div class="toast" id="toast"></div>

        <script src="utils.js"></script>
        <script>
            let taskBadge = 0;

            function toggleSidebar() {
                document.getElementById("sidebar").classList.toggle("open");
                document
                    .getElementById("sidebar-overlay")
                    .classList.toggle("open");
            }

            function showToast(msg) {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.transform = "translateX(-50%) translateY(0)";
                clearTimeout(t._t);
                t._t = setTimeout(() => {
                    t.style.transform = "translateX(-50%) translateY(60px)";
                }, 2200);
            }

            function checkTask(card, amount) {
                if (card.classList.contains("done")) return;
                card.querySelector(".chk").classList.add("on");
                card.querySelector(".task-title").style.textDecoration =
                    "line-through";
                card.classList.add("done");
                taskBadge = Math.max(0, taskBadge - 1);
                const b = document.getElementById("task-badge");
                b.textContent = taskBadge;
                if (taskBadge === 0) b.style.display = "none";
                showToast("+" + amount + " HP — Task completed");
            }

            const sourceTags = {
                system:
                    '<div class="source-tag system">⬡ System</div>',
                admin:
                    '<div class="source-tag admin">◈ Admin</div>',
                personal:
                    '<div class="source-tag personal">✦ Personal</div>',
            };

            function renderTask(task) {
                const doneClass = false ? " done" : "";
                const strikeStyle = false
                    ? ' style="text-decoration: line-through"'
                    : "";
                const chkClass = false ? " on" : "";
                const hpClass = false
                    ? ' style="color: var(--muted)"'
                    : "";
                const dateClass =
                    "date-label" + (false ? " faint" : "");
                // const pills = task.tags
                //     .map(
                //         (t) =>
                //             '<span class="pill ' +
                //             t.color +
                //             '">' +
                //             t.label +
                //             "</span>",
                //     )
                //     .join("");
                return (
                    '<div class="task-card' +
                    doneClass +
                    '" onclick="checkTask(this, ' +
                    task.reward +
                    ')">' +
                    '<div class="chk' +
                    chkClass +
                    '"></div>' +
                    '<div class="task-body">' +
                    '<div class="task-title"' +
                    strikeStyle +
                    ">" +
                    task.title +
                    "</div>" +
                    '<div class="task-meta">' +
                    // (sourceTags[task.source] || "") +
                    // pills +
                    '<span class="' +
                    dateClass +
                    '">' +
                    formaterDue(task.due) +
                    "</span>" +
                    "</div></div>" +
                    '<div class="task-hp"' +
                    hpClass +
                    ">+" +
                    task.reward +
                    " HP</div>" +
                    "</div>"
                );
            }

            const USER_ID = await (await fetch(`/api/user/whoami`)).json();

            let user_data = await (
                await fetch(`/api/user/${USER_ID}`)
            ).json();

            let groups = await (
                await fetch(`/api/user/${USER_ID}/groups`)
            ).json();

            document.getElementById(
                "topbar-initials",
            ).textContent = to_initials(user_data.full_name);

            taskBadge = data.taskBadge;
            document.getElementById("task-badge").textContent =
                2;
            document.getElementById("assign-badge").textContent =
                data.3;

            document.getElementById("sidebar-groups").innerHTML =
                sidebarGroups(groups, null);

            // document.getElementById("due-soon-list").innerHTML =
            //     user_data.tasks.map(renderTask).join("");
            document.getElementById("upcoming-list").innerHTML =
                data.tasks.map(renderTask).join("");

        </script>
    </body>
</html>

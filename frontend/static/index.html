<!doctype html>
<html>
    <head>
        <title>Grinder</title>
        <link rel="icon" type="image/png" href="/images/grinder.png" />
        <link rel="stylesheet" href="/style.css" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
    </head>
    <body>
        <h2 class="sr-only">Grinder — Dashboard</h2>

        <div class="app">
            <div class="topbar">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <a href="/"><div class="logo">Grind<span>e</span>r</div></a>
                <div class="topbar-right">
                    <div class="notif-dot"></div>
                    <div class="avatar-sm" id="topbar-initials">-</div>
                </div>
            </div>

            <div class="sidebar" id="sidebar">
                <div class="sidebar-label">Me</div>
                <a class="sitem active" href="/">
                    <span class="sicon">◈</span>Dashboard
                </a>
                <a class="sitem" href="/tasks">
                    <span class="sicon">✓</span>My Tasks<span
                        class="sbadge"
                        id="task-badge"
                        >3</span
                    >
                </a>
                <a class="sitem" href="/assignments">
                    <span class="sicon">📄</span>Assignments<span
                        class="sbadge"
                        id="assign-badge"
                        style="
                            background: rgba(245, 158, 11, 0.25);
                            color: var(--amber);
                        "
                        >2</span
                    >
                </a>
                <div class="sidebar-label">Groups</div>
                <div id="sidebar-groups"></div>
                <a class="sitem sitem-new">
                    <span class="sicon">+</span>New Group
                </a>
            </div>

            <!-- DASHBOARD -->
            <div class="page active" id="page-dashboard">
                <div class="dash-main">
                    <div class="dash-col">
                        <div class="user-hero">
                            <div class="avatar-lg" id="avatar-lg">AL</div>
                            <div>
                                <div class="user-name" id="user-name">—</div>
                                <div class="user-groups" id="user-groups">
                                    —
                                </div>
                            </div>
                        </div>
                        <div class="hp-card">
                            <div class="hp-top-row">
                                <div class="hp-number" id="hp-val">
                                    — <span>/ — HP</span>
                                </div>
                                <div class="hp-decay">
                                    <div class="pulse-dot"></div>
                                    <span id="hp-decay-text">— HP / day</span>
                                </div>
                            </div>
                            <div class="bar-track">
                                <div
                                    class="bar-fill"
                                    id="hp-bar"
                                    style="width: 0%"
                                ></div>
                            </div>
                            <div class="hp-footer">
                                <span id="hp-pct">—</span
                                ><span id="hp-tick">—</span>
                            </div>
                            <div class="hp-number" id="hp-death">
                                Deaths: <span id="hp-death-val">—</span>
                            </div>
                        </div>
                        <div class="deadline-card">
                            <div class="deadline-date">
                                <div class="deadline-day" id="dl-day">—</div>
                                <div class="deadline-month" id="dl-month">
                                    —
                                </div>
                            </div>
                            <div class="deadline-divider"></div>
                            <div class="deadline-body">
                                <div class="deadline-title" id="dl-title">
                                    —
                                </div>
                                <div class="deadline-sub" id="dl-sub">—</div>
                            </div>
                            <div class="deadline-reward" id="dl-reward">—</div>
                        </div>
                        <div>
                            <div class="sec-label">Actions</div>
                            <div class="actions-grid" id="actions-grid"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div
            class="sidebar-overlay"
            id="sidebar-overlay"
            onclick="toggleSidebar()"
        ></div>
        <div class="toast" id="toast"></div>

        <script src="utils.js"></script>
        <script>
            let hp = 0,
                maxHp = 1000;

            let u;

            let speed = 1;  // DEMO

            function updateHP() {
                let elapsed = (Date.now() / 1000 ) - u.last_tick
                hp = u.health - (elapsed * speed / 864);
                let h = Math.round(hp);
                const pct = Math.round((h / maxHp) * 100);
                document.getElementById("hp-val").innerHTML =
                    h + " <span>/ " + maxHp + " HP</span>";
                document.getElementById("hp-pct").textContent = pct + "%";
                const bar = document.getElementById("hp-bar");
                bar.style.width = pct + "%";
                bar.className =
                    "bar-fill " +
                    (pct > 60 ? "high" : pct > 30 ? "mid" : "low");
                if (hp <= 0) {
                    checkDeath();
                }
            }

            function gainHP(amount, label) {
                hp = Math.min(maxHp, hp + amount);
                updateHP();
                showToast("+" + amount + " HP — " + label);
            }

            function checkDeath() {
                await fetch(`/api/user/deaths`)
                    .then((res) => res.json())
                    .then((data) => {
                        hp = data[0];
                        u.deaths = data[1];
                        updateHP();
                    });
            }

            async function setup() {
                const USER_ID = await (await fetch(`/api/user/whoami`)).json();
                let groups = await (
                    await fetch(`/api/user/${USER_ID}/groups`)
                ).json();


                 u = await (await fetch(`/api/user/${USER_ID}`)).json();
                document.getElementById("sidebar-groups").innerHTML =
                    sidebarGroups(groups, null);

                updateHP();
                setInterval(updateHP, 1000);

                document.getElementById("topbar-initials").textContent =
                    to_initials(u.full_name);
                document.getElementById("avatar-lg").textContent = to_initials(
                    u.full_name,
                );
                document.getElementById("user-name").textContent = u.name;
                // document.getElementById("user-groups").textContent =
                //     u.groups.join(" · ");

                updateHP(hp);
                console.log(u);
                document.getElementById("hp-decay-text").textContent =
                    "−" + 100 + " HP / day";
                document.getElementById("hp-tick").textContent =
                    "next tick in " + 1000;
                document.getElementById("hp-death-val").textContent = u.deaths;

                const dl = data.nextDeadline;
                document.getElementById("dl-day").textContent = dl.day;
                document.getElementById("dl-month").textContent = dl.month;
                document.getElementById("dl-title").textContent = dl.title;
                document.getElementById("dl-sub").textContent = dl.sub;
                document.getElementById("dl-reward").textContent =
                    "+" + dl.reward + " HP";

                document.getElementById("task-badge").textContent =
                    data.taskBadge;
                document.getElementById("assign-badge").textContent =
                    data.assignBadge;

                document.getElementById("actions-grid").innerHTML = data.actions
                    .map(
                        (a) =>
                            '<button class="action-btn" onclick="gainHP(' +
                            a.health +
                            ", '" +
                            a.label +
                            "')\">" +
                            '<div class="action-icon ' +
                            a.iconClass +
                            '">' +
                            a.icon +
                            "</div><div>" +
                            '<div class="action-label">' +
                            a.label +
                            '</div><div class="action-hp">+' +
                            a.health +
                            " HP</div></div></button>",
                    )
                    .join("");
            }
            setup();
        </script>
    </body>
</html>

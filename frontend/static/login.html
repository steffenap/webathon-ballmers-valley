<!DOCTYPE html>
<html>
    <head>
        <title>Grinder — Log in</title>
        <link rel="icon" type="image/png" href="/images/grinder.png">
        <link rel="stylesheet" href="/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    </head>
    <body>
        <h2 class="sr-only">Grinder — Log in</h2>

        <div class="login-wrap">
            <div class="login-card">
                <div>
                    <a href="/"><div class="logo">Grind<span>e</span>r</div></a>
                </div>

                <div class="login-fields">
                    <div class="form-row">
                        <div class="form-label">Username</div>
                        <input
                            class="form-input"
                            id="username"
                            type="text"
                            placeholder="Your username"
                            autocomplete="username"
                            onkeydown="if(event.key==='Enter')login()"
                        />
                    </div>
                    <div class="form-row">
                        <div class="form-label">Password</div>
                        <input
                            class="form-input"
                            id="password"
                            type="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            onkeydown="if(event.key==='Enter')login()"
                        />
                    </div>
                </div>

                <div class="login-error" id="error-msg"></div>

                <button class="btn-login" id="login-btn" onclick="login()">
                    Log in
                </button>
                <button class="btn-login" id="register-btn" onclick="window.location.href='/register'">
                    Register
                </button>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script src="utils.js"></script>
        <script>
            function login() {
                const username = document.getElementById("username").value.trim();
                const password = document.getElementById("password").value;
                const errorEl = document.getElementById("error-msg");
                const btn = document.getElementById("login-btn");

                errorEl.textContent = "";

                if (!username) {
                    errorEl.textContent = "Please enter your username.";
                    document.getElementById("username").focus();
                    return;
                }
                if (!password) {
                    errorEl.textContent = "Please enter your password.";
                    document.getElementById("password").focus();
                    return;
                }

                btn.disabled = true;
                btn.textContent = "Logging in…";

                fetch("/api/user/signin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                    credentials: "include"
                })
                    .then((r) => {
                        if (r.ok) {
                            window.location.href = "/";
                        } else if (r.status === 401) {
                            errorEl.textContent = "Incorrect username or password.";
                        } else {
                            errorEl.textContent = "Something went wrong. Try again.";
                        }
                    })
                    .catch(() => {
                        errorEl.textContent = "Could not reach the server.";
                    })
                    .finally(() => {
                        btn.disabled = false;
                        btn.textContent = "Log in";
                        document.getElementById("password").value = "";
                    });
            }

            // Auto-focus username on load
            document.getElementById("username").focus();
        </script>
    </body>
</html>

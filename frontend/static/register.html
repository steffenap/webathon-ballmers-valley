<!DOCTYPE html>
<html>
    <head>
        <title>Grinder — Register</title>
        <link rel="icon" type="image/png" href="/images/grinder.png">
        <link rel="stylesheet" href="/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    </head>
    <body>
        <h2 class="sr-only">Grinder — Register</h2>

        <div class="login-wrap">
            <div class="login-card">
                <div>
                    <a href="/"><div class="logo">Grind<span>e</span>r</div></a>
                </div>

                <div class="login-fields">
                    <div class="form-row">
                        <div class="form-label">Username</div>
                        <input
                            class="form-input"
                            id="username"
                            type="text"
                            placeholder="Your username"
                            autocomplete="username"
                            onkeydown="if(event.key==='Enter')register()"
                        />
                    </div>
                    <div class="form-row">
                        <div class="form-label">Full name</div>
                        <input
                            class="form-input"
                            id="fullname"
                            type="text"
                            placeholder="Your full name"
                            autocomplete="fullname"
                            onkeydown="if(event.key==='Enter')register()"
                        />
                    </div>
                    <div class="form-row">
                        <div class="form-label">Password</div>
                        <input
                            class="form-input"
                            id="password"
                            type="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            onkeydown="if(event.key==='Enter')register()"
                        />
                    </div>
                </div>

                <div class="login-error" id="error-msg"></div>

                <button class="btn-login" id="register-btn" onclick="register()">
                    Register
                </button>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script src="utils.js"></script>
        <script>
            function register() {
                const username = document.getElementById("username").value.trim();
                const fullname = document.getElementById("fullname").value.trim();
                const password = document.getElementById("password").value;
                const errorEl = document.getElementById("error-msg");
                const btn = document.getElementById("register-btn");

                errorEl.textContent = "";

                if (!username) {
                    errorEl.textContent = "Please create a username.";
                    document.getElementById("username").focus();
                    return;
                }
                if (!fullname) {
                    errorEl.textContent = "Please enter your full name.";
                    document.getElementById("fullname").focus();
                    return;
                }
                if (!password) {
                    errorEl.textContent = "Please create a password.";
                    document.getElementById("password").focus();
                    return;
                }

                btn.disabled = true;
                btn.textContent = "Registering…";

                fetch("/api/user/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, fullname, password }),
                      credentials: "include",
                })
                    .then((r) => {
                      console.log(r);
                        if (r.ok) {
                            //window.location.href = "/";
                        } else if (r.status === 401) {
                            errorEl.textContent = "Username is taken.";
                        } else {
                            errorEl.textContent = "Something went wrong. Try again.";
                        }
                    })
                    .catch(() => {
                        errorEl.textContent = "Could not reach the server.";
                    })
                    .finally(() => {
                        btn.disabled = false;
                        btn.textContent = "Register";
                        document.getElementById("password").value = "";
                    });
            }
            // Auto-focus username on load
            document.getElementById("username").focus();
        </script>
    </body>
</html>
